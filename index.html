<section class="order-form container">
    <h2>Place Your Order</h2>
    <form id="orderForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <textarea id="address" placeholder="Delivery Address" required></textarea>
        <input type="text" id="orderItems" placeholder="What are you ordering?" required>
        <input type="number" id="price" placeholder="Total Price" required>
        <button type="submit" class="btn">Confirm Order</button>
    </form>
</section>

<style>
    /* Add this to your style.css */
    .order-form { padding: 50px 0; max-width: 500px; }
    form input, form textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; }
    form button { cursor: pointer; width: 100%; border: none; }
</style>

<!-- Supabase Script -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Replace these with your keys from Project Settings > API
  const SUPABASE_URL = 'https://ngmzvmgsddiemeznmvoh.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_VIO-91cj_hjORjt1OgTd_A_zJnE9GrJ';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const form = document.getElementById('orderForm');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Get values from form
    const customer_name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const address = document.getElementById('address').value;
    const items = document.getElementById('orderItems').value;
    const total_price = document.getElementById('price').value;

    // Send to Supabase
    const { data, error } = await supabaseClient
      .from('orders')
      .insert([{ customer_name, email, address, items, total_price }]);

    if (error) {
      alert('Error: ' + error.message);
    } else {
      alert('Success! Your order has been placed.');
      form.reset();
    }
  });
</script>
